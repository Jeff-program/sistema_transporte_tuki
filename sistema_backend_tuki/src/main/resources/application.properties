# CONFIGURACIÓN DE BASE DE DATOS (Asegúrate de tener creada la BD 'tuki_db' en pgAdmin)
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/transporte_tuki_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIBERNATE Y JPA (Ajustado a 'update' para que cree las tablas automáticamente si faltan)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SERVIDOR BACKEND
server.port=8080
server.address=${SERVER_ADDRESS:127.0.0.1}

# JWT SECURITY (Clave secreta larga para firmar los tokens)
app.jwt-secret=${JWT_SECRET:local-dev-only-change-this-secret-key-para-transporte-tuki-2026-minimo-64-caracteres}
app.jwt-expiration-milliseconds=${JWT_EXPIRATION_MS:86400000}

# USUARIOS INICIALES (solo se crean si defines estas variables)
app.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@tuki.com}
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.superadmin-email=${BOOTSTRAP_SUPERADMIN_EMAIL:super@tuki.com}
app.bootstrap.superadmin-password=${BOOTSTRAP_SUPERADMIN_PASSWORD:}

# CORREO (Para recuperación de contraseñas de los usuarios)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# LÍMITES DE ARCHIVOS (Para subir fotos de perfil)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
